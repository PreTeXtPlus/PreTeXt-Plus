services:
  local-builder:
    build:
      context: .
      dockerfile: .dev/local/builder/Dockerfile
    environment:
      BUILD_TOKEN: local-build-token
    ports:
      - "${LOCAL_BUILDER_HOST_PORT:-4010}:4010"

  local-s3:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  minio_data: